<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" role="img" aria-label="Deflection Sim frame (fallback)">
  <defs>
    <radialGradient id="space" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0" stop-color="#0a1f33"/>
      <stop offset="1" stop-color="#03080f"/>
    </radialGradient>
    <radialGradient id="earth" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#2f7fd6"/>
      <stop offset="0.5" stop-color="#1b5aa8"/>
      <stop offset="1" stop-color="#0a2547"/>
    </radialGradient>
    <radialGradient id="atmo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.72" stop-color="#28e0ff" stop-opacity="0"/>
      <stop offset="0.9" stop-color="#28e0ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#28e0ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#space)"/>
  <!-- stars -->
  <g fill="#cfefff">
    <circle cx="70" cy="60" r="1.3" opacity="0.8"/>
    <circle cx="150" cy="120" r="1" opacity="0.5"/>
    <circle cx="540" cy="70" r="1.4" opacity="0.9"/>
    <circle cx="600" cy="150" r="1" opacity="0.5"/>
    <circle cx="500" cy="330" r="1.2" opacity="0.7"/>
    <circle cx="90" cy="300" r="1" opacity="0.6"/>
    <circle cx="260" cy="40" r="1" opacity="0.5"/>
    <circle cx="360" cy="360" r="1.1" opacity="0.6"/>
  </g>

  <!-- frame -->
  <rect x="12" y="12" width="616" height="376" fill="none" stroke="#16b8d4" stroke-width="1.5" opacity="0.85" rx="6"/>
  <g stroke="#28e0ff" stroke-width="2" fill="none">
    <path d="M26 26 h22 M26 26 v22"/>
    <path d="M614 26 h-22 M614 26 v22"/>
    <path d="M26 374 h22 M26 374 v-22"/>
    <path d="M614 374 h-22 M614 374 v-22"/>
  </g>

  <text x="40" y="52" font-family="'Consolas','Courier New',monospace" font-size="13" letter-spacing="3" fill="#5fd0e6">SLINGSHOT // KINETIC-IMPACTOR SIM</text>
  <text x="40" y="86" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="2" fill="#e9fbff" filter="url(#g2)">DEFLECTION SIM</text>

  <!-- Earth -->
  <g transform="translate(210 250)">
    <circle r="96" fill="url(#atmo)"/>
    <circle r="78" fill="url(#earth)" stroke="#0a2547" stroke-width="1.5"/>
    <g fill="#2f9e6a" opacity="0.85">
      <path d="M-40 -30 q20 -14 44 -4 q10 18 -8 30 q-30 6 -40 -8 q-6 -12 4 -18 z"/>
      <path d="M6 24 q22 -6 34 8 q-4 22 -26 26 q-18 -4 -18 -20 q2 -12 10 -14 z"/>
      <path d="M-52 20 q10 -4 16 6 q-2 14 -16 12 q-6 -10 0 -18 z"/>
    </g>
    <ellipse rx="78" ry="78" fill="none" stroke="#0b1a2e" stroke-width="10" opacity="0.15"/>
  </g>

  <!-- incoming trajectory that bends to a safe miss -->
  <path d="M600 70 C 470 150, 380 190, 320 214 C 268 236, 238 268, 250 320"
        fill="none" stroke="#ff5a4d" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.9" filter="url(#g2)"/>
  <!-- deflection point / impactor burst -->
  <g transform="translate(320 214)">
    <circle r="6" fill="#ffd34d"/>
    <g stroke="#ffd34d" stroke-width="2">
      <path d="M0 -14 V-24 M0 14 V24 M-14 0 H-24 M14 0 H24 M-10 -10 L-17 -17 M10 10 L17 17 M10 -10 L17 -17 M-10 10 L-17 17"/>
    </g>
    <text y="-30" text-anchor="middle" font-family="'Consolas',monospace" font-size="10" letter-spacing="1" fill="#ffd34d">IMPACTOR Δv</text>
  </g>

  <!-- deflected safe-miss vector -->
  <path d="M320 214 C 360 250, 430 250, 520 210 L 596 176"
        fill="none" stroke="#28e0ff" stroke-width="2.5" opacity="0.95" filter="url(#g2)" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 3 L0 6 z" fill="#28e0ff"/>
    </marker>
  </defs>

  <!-- miss-distance callout -->
  <g transform="translate(430 300)" font-family="'Consolas','Courier New',monospace">
    <text font-size="11" letter-spacing="2" fill="#4f93ad">RESULT</text>
    <text y="24" font-size="20" font-weight="700" fill="#28e0ff">SAFE MISS</text>
    <text y="46" font-size="12" fill="#6fb4c9">trajectory deflected</text>
  </g>

  <text x="614" y="374" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="10" letter-spacing="2" fill="#3a6a80">FALLBACK FRAME · AWAITING OMNI FLASH</text>
</svg>
